name: bloc_gen_runner
description: "A powerful build_runner-based code generator for the BLoC state management pattern. Eliminates boilerplate by automatically generating abstract base classes that wire up event transformers, equality logic, and copyWith methods — letting you focus on business logic instead of ceremony. Supports Concurrent, Sequential, Restartable, Droppable, Debounce, and Throttle transformers via a type-safe annotation API, with zero changes required to your existing BLoC code."
version: 0.0.1+2
publish_to: https://github.com/makri-aymen/bloc_gen_runner

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.8.0"

dependencies:
  flutter:
    sdk: flutter
  build: ^4.0.5
  build_config: ^1.3.0
  dart_style: ^3.1.5
  pub_semver: ^2.2.0
  built_collection: ^5.1.1
  analyzer: ^10.0.0
  source_gen: ^4.2.2
  code_builder: ^4.11.1
  bloc_gen_annotations: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  build_test: ^3.5.12

flutter: