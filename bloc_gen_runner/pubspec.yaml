name: bloc_gen_runner
description: "Zero-boilerplate BLoC generation simplifying bloc_concurrency equatable packages, and 6 event transformers via annotations."
version: 0.0.1+6
# Published on GitHub: https://github.com/makri-aymen/bloc_gen_runner
repository: https://github.com/makri-aymen/bloc_gen_runner
issue_tracker: https://github.com/makri-aymen/bloc_gen_runner/issues
homepage:

topics:
  - bloc
  - bloc-concurrency
  - state-management
  - code-generator

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.8.0"

dependencies:
  flutter:
    sdk: flutter
  build: ^4.0.5
  build_config: ^1.3.0
  dart_style: ^3.1.5
  pub_semver: ^2.2.0
  built_collection: ^5.1.1
  analyzer: ^10.0.0
  source_gen: ^4.2.2
  code_builder: ^4.11.1
  bloc_gen_annotations: ^0.0.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  build_test: ^3.5.12

flutter:

screenshots:
  - description: The bloc_gen_runner package logo.
    path: screenshots/logo.png